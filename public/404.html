    <script>
      /**
       * GitHub Pages SPA 路由支持方案
       * 
       * GitHub Pages 不支持服务器端路由重写，因此使用客户端重定向
       * 当用户刷新页面或直接访问深层路由时，GitHub Pages 会显示此 404.html
       * 然后通过 JavaScript 将用户重定向到正确的路由
       * * 原理：
       * 1. 当用户直接访问 /docs/README 这样的路由时
       * 2. GitHub Pages 会返回 404.html（本文件）
       * 3. 本脚本将当前路径保存到 sessionStorage
       * 4. 然后重定向到根路径 /
       * 5. 根路径的 index.html 加载后，从 sessionStorage 读取保存的路径
       * 6. 使用 React Router 导航到正确的路由
       */
      (function() {
        // 获取当前页面的完整路径（包括查询参数和哈希）
        const path = window.location.pathname;
        const search = window.location.search;
        const hash = window.location.hash;
        
        // 保存当前路径到 sessionStorage
        sessionStorage.setItem('spa-redirect-path', path + search + hash);
        
        // 重定向到根路径
        // 使用 replace 而不是 href，避免在浏览器历史中留下 404 记录
        window.location.replace('/');
      })();
    </script>

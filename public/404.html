        display: flex;

        color: #333;
      }
      .loading-spinner {
        border: 4px solid #f3f3f3f;
        border-top: 4px solid #1890ff;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;

      }
      @keyframes spin {

  <body>
    <div id="root">
      <div class="loading">
        <div class="loading-spinner"></div>
        <span>正在加载...</span>
      </div>
    </div>
    <script>
      /**
       * GitHub Pages SPA 路由支持方案
       * 
       * GitHub Pages 不支持服务器端路由重写，因此使用客户端重定向
       * 当用户刷新页面或直接访问深层路由时，GitHub Pages 会显示此 404.html
       * 然后通过 JavaScript 将用户重定向到正确的路由
       */
      
      (function() {
        // 获取当前页面的路径
        const path = window.location.pathname;
        
        // 获取查询参数和哈希
        const search = window.location.search;
        const hash = window.location.hash;
        
        // 构建完整 URL
        const redirectUrl = path + search + hash;
        
        // 使用 history.replaceState 而不是 location.replace
        // 这样可以避免在浏览器历史记录中留下 404 页面的记录
        window.history.replaceState({}, '', redirectUrl);
        
        // 重新加载页面以触发 React Router
        window.location.reload();
      })();
      </script>
  </body>
